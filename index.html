<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NuviraByteCore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --accent: #c8f060;
      --gray: #e8e8e8;
      --mid: #888;
      --radius: 4px;
      --transition: 0.22s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--gray);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 60px;
    }

    .nav-logo-sub { display: block; font-size: 10px; font-weight: 400; letter-spacing: 0.04em; color: var(--mid); line-height: 1.2; }

    .nav-logo {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      text-decoration: none;
      color: var(--black);
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--black);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color var(--transition);
    }

    .nav-links a.active {
      color: var(--black);
    }

    .nav-links a.disabled {
      color: var(--mid);
      cursor: default;
      pointer-events: none;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .hero img {
      max-width: 100%;
      max-height: calc(100vh - 180px);
      border-radius: 12px;
      display: block;
      object-fit: contain;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--gray);
      padding: 28px 48px;
      display: flex;
      justify-content: center;
    }

    .footer-copy { font-size: 14px; color: var(--mid); }

    .footer-copy a {
      color: var(--mid);
      text-decoration: none;
      transition: color var(--transition);
    }

    .footer-copy a:hover { color: var(--black); }

    /* ── BURGER + DRAWER ── */
    .burger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      width: 36px;
      height: 36px;
    }

    .burger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--black);
      border-radius: 2px;
      transition: transform 0.25s ease, opacity 0.25s ease;
      transform-origin: center;
    }

    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .drawer-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 60px;
      right: 0;
      z-index: 400;
      background: var(--white);
      border-left: 1px solid var(--gray);
      border-bottom: 1px solid var(--gray);
      border-radius: 0 0 0 12px;
      min-width: 200px;
      padding: 8px 0;
      transform: translateX(110%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: -4px 4px 24px rgba(0,0,0,0.08);
    }

    .drawer.open { transform: translateX(0); }

    .drawer-links { list-style: none; }

    .drawer-links a {
      display: block;
      padding: 13px 24px;
      text-decoration: none;
      color: var(--black);
      font-size: 15px;
      font-weight: 500;
      transition: background var(--transition);
    }

    .drawer-links a:hover { background: var(--gray); }

    .drawer-links a.disabled {
      color: var(--mid);
      pointer-events: none;
      cursor: default;
    }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .nav-links { display: none !important; }
      .burger { display: flex; }
      .hero { padding: 24px; }
      footer { padding: 24px 20px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero img { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">
      NuviraByteCore
      <span class="nav-logo-sub">powered by Alex.Chuck</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Главная</a></li>
      <li><a class="disabled">Заметки</a></li>
      <li><a class="disabled">Обои</a></li>
      <li><a class="disabled">О NBC</a></li>
    </ul>
    <button class="burger" id="burgerBtn" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <ul class="drawer-links">
      <li><a href="index.html">Главная</a></li>
      <li><a class="disabled">Заметки</a></li>
      <li><a class="disabled">Обои</a></li>
      <li><a class="disabled">О NBC</a></li>
    </ul>
  </div>

  <!-- HERO IMAGE -->
  <section class="hero">
    <img src="https://i.ibb.co/tdQQsxq/IMG-2593.jpg" alt="Main" />
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-copy">Made with ❤️ by <a href="https://t.me/alex_chuck_x" target="_blank" style="font-weight:700;">Alex.Chuck</a></div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('burgerBtn');
      var drawer = document.getElementById('drawer');
      var overlay = document.getElementById('drawerOverlay');

      function openMenu() {
        btn.classList.add('open');
        drawer.classList.add('open');
        overlay.classList.add('visible');
      }

      function closeMenu() {
        btn.classList.remove('open');
        drawer.classList.remove('open');
        overlay.classList.remove('visible');
      }

      function toggleMenu(e) {
        e.preventDefault();
        e.stopPropagation();
        drawer.classList.contains('open') ? closeMenu() : openMenu();
      }

      btn.addEventListener('click', toggleMenu);
      btn.addEventListener('touchstart', toggleMenu, { passive: false });

      overlay.addEventListener('click', closeMenu);
      overlay.addEventListener('touchstart', function(e) {
        e.preventDefault();
        closeMenu();
      }, { passive: false });

      document.querySelectorAll('.drawer-links a:not(.disabled)').forEach(function(link) {
        link.addEventListener('click', closeMenu);
      });
    });
  </script>

</body>
</html>
